        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: Georgia, 'Times New Roman', serif; 
            background-color: #0a0a0a;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
            position: relative;
        }
        
        :root {
            --ws-primary: #8c0004;
            --ws-primary-dark: #6b0003;
            --ws-primary-light: #a51e22;
            --ws-gold: #d4af37;
            --ws-silver: #c0c0c0;
            --ws-bronze: #cd7f32;
        }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { 
            background: var(--ws-primary); 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--ws-primary-light); }
        
        .sans-font { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        /* Glassmorphism effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(140, 0, 4, 0.2);
            position: relative;
        }
        
        /* Fixed height wine cards */
        .wine-card { 
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            height: 100%;
            min-height: 480px;
            z-index: 1;
        }
        
        /* Mobile wine card height */
        @media (max-width: 640px) {
            .wine-card {
                min-height: 420px;
            }
        }
        
        .wine-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(140, 0, 4, 0.05), transparent);
            transition: left 0.5s;
        }
        
        .wine-card:hover::before {
            left: 100%;
        }
        
        .wine-card:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(140,0,4,0.2);
            border-color: var(--ws-primary-light);
        }
        
        /* Main app container */
        .min-h-screen {
            position: relative;
            min-height: 100vh;
        }
        
        /* Video hero section */
        .hero-section {
            position: relative;
            height: 80vh;
            overflow: hidden;
            background: #000;
            margin: 0;
            padding: 0;
            top: 0;
        }
        
        /* Mobile hero height */
        @media (max-width: 768px) {
            .hero-section {
                height: 60vh;
            }
        }
        
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        
        .hero-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, 
                rgba(0,0,0,0.4) 0%, 
                rgba(140,0,4,0.3) 50%, 
                rgba(0,0,0,0.8) 100%);
            z-index: 2;
        }
        
        /* Hero content positioning */
        .hero-content {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            color: white;
            padding: 1rem;
            pointer-events: none;
        }
        
        .hero-content a,
        .hero-content button {
            pointer-events: all;
        }

        /* Animated background */
        .animated-bg {
            background: linear-gradient(45deg, #0a0a0a 0%, #1a0a0a 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* CRITICAL: Fixed dropdown z-index and positioning */
        .dropdown-wrapper {
            position: relative;
            z-index: 50 !important;
        }
        
        .dropdown-content {
            max-height: 240px;
            overflow-y: auto;
            z-index: 50 !important;
            position: absolute;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            margin-top: 4px;
            width: 100%;
        }
        
        /* Mobile dropdown adjustments */
        @media (max-width: 640px) {
            .dropdown-content {
                max-height: 200px;
            }
        }
        
        /* Ensure filter section has proper z-index */
        .filter-section {
            position: relative;
            z-index: 20;
        }
        
        /* AI Assistant z-index */
        .ai-assistant-container {
            position: fixed;
            top: 6rem;
            right: 1.5rem;
            z-index: 40;
        }
        
        /* Rank badges with glow */
        .rank-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #f4e4bc 50%, #d4af37 100%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: goldPulse 2s infinite;
        }
        
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.8); }
        }
        
        .rank-silver { 
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 50%, #c0c0c0 100%);
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
        }
        
        .rank-bronze { 
            background: linear-gradient(135deg, #cd7f32 0%, #e8c4a0 50%, #cd7f32 100%);
            box-shadow: 0 0 15px rgba(205, 127, 50, 0.5);
        }
        
        /* Wine glass with liquid animation */
        .wine-glass-placeholder { 
            background: linear-gradient(180deg, #1a1a1a 0%, #2a1a1a 100%);
            position: relative; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
        }
        
        .wine-glass-placeholder::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(140,0,4,0.1) 0%, transparent 70%);
            animation: swirl 20s linear infinite;
        }
        
        @keyframes swirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .wine-card-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            height: 100%;
        }
        
        .wine-card-details { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            padding: 1.25rem;
        }
        
        /* Modern modal */
        .modal-backdrop { 
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        
        /* Mobile modal adjustments */
        @media (max-width: 768px) {
            .modal-content {
                margin: 0;
                max-height: 100vh;
                border-radius: 0;
            }
            
            .modal-image-container {
                height: 200px !important;
            }
        }
        
        /* Smooth animations */
        .animate-fade-in { 
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeInUp { 
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Loading animation */
        .loading-wine {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(140,0,4,0.1);
            border-radius: 50%;
            border-top-color: var(--ws-primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Mobile AI assistant positioning */
        @media (max-width: 640px) {
            .ai-chat-window {
                width: calc(100vw - 2rem) !important;
                max-width: 400px;
                right: 1rem !important;
                bottom: 5rem !important;
            }
        }
        
        /* Modern footer */
        .footer-bg { 
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 100%);
            border-top: 1px solid rgba(140,0,4,0.3);
        }
        
        /* Parallax section */
        .parallax-section {
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .parallax-bg {
            position: absolute;
            inset: -20%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(140,0,4);stop-opacity:0.1" /><stop offset="100%" style="stop-color:rgb(212,175,55);stop-opacity:0.1" /></linearGradient></defs><rect width="1200" height="800" fill="url(%23grad)" /><circle cx="100" cy="100" r="80" fill="rgba(140,0,4,0.05)" /><circle cx="1100" cy="700" r="120" fill="rgba(212,175,55,0.05)" /></svg>') center/cover;
            filter: blur(3px);
            transform: translateZ(-1px) scale(1.5);
        }
        
        /* Pulse animation for buttons */
        .pulse-button {
            position: relative;
            overflow: hidden;
        }
        
        .pulse-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .pulse-button:active::after {
            width: 300px;
            height: 300px;
        }
        
        /* Text glow effect */
        .glow-text {
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }
        
        /* Premium texture overlay */
        .texture-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.1) 35px, rgba(255,255,255,.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(0,0,0,.03) 35px, rgba(0,0,0,.03) 70px);
            z-index: 0;
        }
        
        /* Navbar glass effect */
        .navbar-glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(140,0,4,0.2);
        }
        
        /* Main content z-index fix */
        main {
            position: relative;
            z-index: 10;
        }
        
        /* Wine grid container */
        .wine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            align-items: stretch;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Condensed wine grid */
        .wine-grid-condensed {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 1024px) {
            .wine-grid-condensed {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        /* Wine card z-index */
        .wine-card {
            position: relative;
            z-index: 1;
        }
        
        /* Mobile grid adjustments */
        @media (max-width: 640px) {
            .wine-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
        
        .wine-grid > * {
            height: 100%;
        }
        
        /* Mobile navigation */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 300px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            transition: right 0.3s ease;
            z-index: 50;
            padding: 2rem;
        }
        
        .mobile-menu.open {
            right: 0;
        }
        
        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 49;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .mobile-menu-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Touch-friendly buttons */
        @media (max-width: 768px) {
            button, a {
                min-height: 44px;
                min-width: 44px;
            }
        }
    </style>
</head>

                country: [],
                region: [],
                priceRange: [0, 20000],
                scoreRange: [0, 100],
                vintage: []
            });
            const [sortBy, setSortBy] = useState('rank');
            const [selectedWine, setSelectedWine] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [tastingData, setTastingData] = useState(initializeTastingData());
            const [scrolled, setScrolled] = useState(false);
            const [isCondensedView, setIsCondensedView] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setScrolled(window.scrollY > 100);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const filteredAndSortedWines = useMemo(() => {
                const filtered = wines.filter(wine => {
                    if (filters.search) {
                        const searchTerm = filters.search.toLowerCase();
                        if (!wine.name.toLowerCase().includes(searchTerm) &&
                            !wine.winery.toLowerCase().includes(searchTerm) &&
                            !wine.region.toLowerCase().includes(searchTerm) &&
                            !wine.country.toLowerCase().includes(searchTerm) &&
                            !wine.varietal.toLowerCase().includes(searchTerm)) {
                            return false;
                        }
                    }
                    if (filters.type.length > 0 && !filters.type.includes(wine.type)) return false;
                    if (filters.country.length > 0 && !filters.country.includes(wine.country)) return false;
                    if (filters.vintage.length > 0 && !filters.vintage.includes(wine.vintage.toString())) return false;
                    return true;
                });

                const sorted = [...filtered].sort((a, b) => {
                    switch (sortBy) {
                        case 'rank': return a.rank - b.rank;
                        case 'score-desc': return b.score - a.score;
                        case 'score-asc': return a.score - b.score;
                        case 'price-desc': return b.price - a.price;
                        case 'price-asc': return a.price - b.price;
                        case 'vintage-desc': return b.vintage - a.vintage;
                        case 'vintage-asc': return a.vintage - b.vintage;
                        case 'name': return a.name.localeCompare(b.name);
                        default: return a.rank - b.rank;
                    }
                });
                return sorted;
            }, [filters, sortBy]);

            const handleTastingChange = (wineId, type, checked) => {
                const newTastingData = { ...tastingData };
                if (checked) {
                    if (!newTastingData[type].includes(wineId)) {
                        newTastingData[type] = [...newTastingData[type], wineId];
                    }
                } else {
                    newTastingData[type] = newTastingData[type].filter(id => id !== wineId);
                }
                setTastingData(newTastingData);
                localStorage.setItem('wineTastings', JSON.stringify(newTastingData));
            };

            return (
                <div className="min-h-screen">
                    <Navbar scrolled={scrolled} />
                    <Hero />
                    
                    <div id="about" className="parallax-section bg-gray-900 relative">
                        <div className="parallax-bg"></div>
                        <div className="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-20">
                            <div className="glass-card rounded-xl p-6 sm:p-8">
                                <div className="prose prose-lg max-w-none text-gray-300">
                                    <h2 className="text-2xl sm:text-3xl font-bold text-white mb-6">About the Top 100</h2>
                                    <p className="leading-relaxed mb-4">Wine Spectator's Top 100 is our editors' annual selection of the year's most exciting wines. These 100 bottles represent the pinnacle of quality, value, and availability - wines that don't just score high, but deliver exceptional drinking experiences and tell compelling stories.</p>
                                    <p className="leading-relaxed mb-4">Our expert panel tastes more than 15,000 wines blind each year. From this extensive evaluation, we select these 100 wines that exemplify excellence across all categories - from everyday values to once-in-a-lifetime splurges.</p>
                                    <p className="leading-relaxed">This year's list celebrates both tradition and innovation, featuring time-honored estates alongside exciting new discoveries. Each wine has earned its place through a combination of outstanding quality, fair pricing relative to its peers, and sufficient production to be found in the market.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <main id="wines" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-20 space-y-8 sm:space-y-12">
                        <TastingTracker tastingData={tastingData} />
                        <AnalyticsDashboard wines={filteredAndSortedWines} />
                        <WineFilters filters={filters} onFiltersChange={setFilters} sortBy={sortBy} onSortChange={setSortBy} totalWines={wines.length} filteredCount={filteredAndSortedWines.length} isCondensedView={isCondensedView} onViewToggle={setIsCondensedView} />
                        {filteredAndSortedWines.length > 0 ? (
                            <div className={isCondensedView ? "wine-grid-condensed" : "wine-grid"}>
                                {filteredAndSortedWines.map((wine, index) => (
                                    <div key={wine.id} style={{ animationDelay: `${index * 0.05}s` }}>
                                        {isCondensedView ? (
                                            <WineCardCondensed wine={wine} onViewDetails={(w) => { setSelectedWine(w); setIsModalOpen(true); }} tastingData={tastingData} onTastingChange={handleTastingChange} />
                                        ) : (
                                            <WineCard wine={wine} onViewDetails={(w) => { setSelectedWine(w); setIsModalOpen(true); }} tastingData={tastingData} onTastingChange={handleTastingChange} />
                                        )}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20">
                                <h3 className="text-2xl font-semibold text-white mb-2">No wines found</h3>
                                <p className="text-gray-400 mb-6">Try adjusting your filters to discover more exceptional wines.</p>
                                <button onClick={() => setFilters({ search: '', type: [], country: [], region: [], priceRange: [0, 20000], scoreRange: [0, 100], vintage: [] })} className="bg-gradient-to-r from-red-800 to-red-900 text-white px-6 py-3 rounded-full hover:from-red-900 hover:to-red-800 transition-all duration-300">
                                    Reset All Filters
                                </button>
                            </div>
                        )}
                    </main>
                    <Footer />
                    <WineDetailModal wine={selectedWine} isOpen={isModalOpen} onClose={() => { setIsModalOpen(false); setSelectedWine(null); }} tastingData={tastingData} onTastingChange={handleTastingChange} />
                    <AIAssistant wines={wines} />
                </div>
            );
        }

        ReactDOM.render(<HomePage />, document.getElementById('root'));
    </script>
</body>
</html>
