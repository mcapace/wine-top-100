    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

        /* Global Resets and Basic Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: Georgia, 'Times New Roman', serif; 
            background-color: #0a0a0a;
            overflow-x: hidden;
        }
        
        #root {
            min-height: 100vh;
            position: relative;
        }
        
        /* CSS Variables for Theming */
        :root {
            --ws-primary: #8c0004;
            --ws-primary-dark: #6b0003;
            --ws-primary-light: #a51e22;
            --ws-gold: #d4af37;
            --ws-silver: #c0c0c0;
            --ws-bronze: #cd7f32;
        }
        
        /* Smooth scrolling behavior */
        html { scroll-behavior: smooth; }
        
        /* Custom Scrollbar Styling */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { 
            background: var(--ws-primary); 
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--ws-primary-light); }
        
        .sans-font { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        /* Glassmorphism Card Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(140, 0, 4, 0.2);
            position: relative;
        }
        
        /* Wine Card Styling and Hover Effects */
        .wine-card { 
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            height: 100%;
            min-height: 480px;
            z-index: 1;
        }
        
        @media (max-width: 640px) {
            .wine-card {
                min-height: 420px;
            }
        }
        
        .wine-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(140, 0, 4, 0.05), transparent);
            transition: left 0.5s;
        }
        
        .wine-card:hover::before {
            left: 100%;
        }
        
        .wine-card:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(140,0,4,0.2);
            border-color: var(--ws-primary-light);
        }
        
        /* Hero Section CSS for Video Background */
        .hero-section {
            position: relative;
            height: 60vh;
            min-height: 500px;
            overflow: hidden;
            background-color: #000; /* Fallback color */
        }
        
        .hero-section video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 1;
            transform: translateX(-50%) translateY(-50%);
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .hero-section {
                height: 50vh;
                min-height: 400px;
            }
        }
        
        @media (min-width: 1920px) {
            .hero-section {
                height: 50vh;
                min-height: 600px;
            }
        }
        
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(140,0,4,0.2) 50%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
        }
        
        .hero-content {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
            text-align: center;
            color: white;
            padding: 1rem;
            pointer-events: none;
        }
        
        .hero-content a,
        .hero-content button {
            pointer-events: all;
        }

        /* Animated Background Gradient */
        .animated-bg {
            background: linear-gradient(45deg, #0a0a0a 0%, #1a0a0a 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Dropdown Positioning and Styling */
        .dropdown-wrapper {
            position: relative;
            z-index: 50;
        }
        
        .dropdown-content {
            max-height: 240px;
            overflow-y: auto;
            z-index: 50;
            position: absolute;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: white;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            margin-top: 4px;
            width: 100%;
        }
        
        @media (max-width: 640px) {
            .dropdown-content {
                max-height: 200px;
            }
        }
        
        /* Z-index Management */
        .filter-section {
            position: relative;
            z-index: 20;
        }
        
        .ai-assistant-container {
            position: fixed;
            top: 5rem;
            right: 1.5rem;
            z-index: 40;
        }
        
        /* Rank Badge Styling with Glow Animations */
        .rank-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #f4e4bc 50%, #d4af37 100%);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: goldPulse 2s infinite;
        }
        
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); }
            50% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.8); }
        }
        
        .rank-silver { 
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 50%, #c0c0c0 100%);
            box-shadow: 0 0 15px rgba(192, 192, 192, 0.5);
        }
        
        .rank-bronze { 
            background: linear-gradient(135deg, #cd7f32 0%, #e8c4a0 50%, #cd7f32 100%);
            box-shadow: 0 0 15px rgba(205, 127, 50, 0.5);
        }
        
        /* Animated Wine Glass Placeholder */
        .wine-glass-placeholder { 
            background: linear-gradient(180deg, #1a1a1a 0%, #2a1a1a 100%);
            position: relative; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 220px;
            padding-top: 15px;
        }
        
        .wine-glass-placeholder::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(140,0,4,0.1) 0%, transparent 70%);
            animation: swirl 20s linear infinite;
        }
        
        @keyframes swirl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Flexbox Layout for Wine Card Content */
        .wine-card-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            height: 100%;
        }
        
        .wine-card-details { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            padding: 1.25rem;
        }
        
        /* Modal Styling */
        .modal-backdrop { 
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
        
        @media (max-width: 768px) {
            .modal-content {
                margin: 0;
                max-height: 100vh;
                border-radius: 0;
            }
            .modal-image-container {
                height: 180px !important;
            }
        }
        
        /* Fade-in Animation */
        .animate-fade-in { 
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeInUp { 
            from { 
                opacity: 0;
                transform: translateY(30px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Loading Spinner Animation */
        .loading-wine {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(140,0,4,0.1);
            border-radius: 50%;
            border-top-color: var(--ws-primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Mobile AI Assistant Adjustments */
        @media (max-width: 640px) {
            .ai-chat-window {
                width: calc(100vw - 2rem) !important;
                max-width: 400px;
                right: 1rem !important;
                bottom: 5rem !important;
            }
        }
        
        /* Footer Styling */
        .footer-bg { 
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 100%);
            border-top: 1px solid rgba(140,0,4,0.3);
        }
        
        /* Parallax Section Styling */
        .parallax-section {
            position: relative;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1px;
            transform-style: preserve-3d;
        }
        
        .parallax-bg {
            position: absolute;
            inset: -20%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(140,0,4);stop-opacity:0.1" /><stop offset="100%" style="stop-color:rgb(212,175,55);stop-opacity:0.1" /></linearGradient></defs><rect width="1200" height="800" fill="url(%23grad)" /><circle cx="100" cy="100" r="80" fill="rgba(140,0,4,0.05)" /><circle cx="1100" cy="700" r="120" fill="rgba(212,175,55,0.05)" /></svg>') center/cover;
            filter: blur(3px);
            transform: translateZ(-1px) scale(1.5);
        }
        
        /* Button Pulse Animation on Click */
        .pulse-button {
            position: relative;
            overflow: hidden;
        }
        
        .pulse-button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .pulse-button:active::after {
            width: 300px;
            height: 300px;
        }
        
        /* Text Glow Effect */
        .glow-text {
            text-shadow: 0 0 20px rgba(212,175,55,0.5);
        }
        
        /* Subtle Texture Overlay */
        .texture-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255,255,255,.1) 35px, rgba(255,255,255,.1) 70px),
                repeating-linear-gradient(-45deg, transparent, transparent 35px, rgba(0,0,0,.03) 35px, rgba(0,0,0,.03) 70px);
            z-index: 0;
        }
        
        /* Navbar Glass Effect on Scroll */
        .navbar-glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(140,0,4,0.2);
        }
        
        main {
            position: relative;
            z-index: 10;
        }
        
        
        /* Wine Grid Layouts (Standard and Condensed) */
        .wine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            align-items: stretch;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        .wine-grid-condensed {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 1024px) {
            .wine-grid-condensed {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        .wine-card {
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 640px) {
            .wine-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
        
        .wine-grid > * {
            height: 100%;
        }
        
        /* Mobile Navigation Menu (Off-canvas) */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 300px;
            height: 100vh;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            transition: right 0.3s ease;
            z-index: 50;
            padding: 2rem;
        }
        
        .mobile-menu.open {
            right: 0;
        }
        
        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 49;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .mobile-menu-overlay.open {
            opacity: 1;
            pointer-events: all;
        }
        
        /* Accessibility: Touch-friendly button sizes */
        @media (max-width: 768px) {
            button, a {
                min-height: 44px;
                min-width: 44px;
            }
        }

        /* Sparkling Badge Animation */
        @keyframes sparkling-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sparkling-badge {
            background: linear-gradient(45deg, #a0d2eb, #e5eaf5, #a0d2eb, #e5eaf5);
            background-size: 400% 400%;
            animation: sparkling-gradient 4s ease infinite;
        }
    </style>
</head>

        const getAIAssistantResponseFromServer = async (prompt) => {

                "USA": { lat: 38.9637, lon: -95.7129 },
                "Germany": { lat: 51.1657, lon: 10.4515 },

            useEffect(() => {
                const mount = mountRef.current;
                if (!mount || !window.THREE) return;
                
                let scene = new THREE.Scene();
                let camera = new THREE.PerspectiveCamera(75, mount.clientWidth / mount.clientHeight, 0.1, 1000);
                let renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(mount.clientWidth, mount.clientHeight);
                mount.appendChild(renderer.domElement);

                // Globe
                const globeGroup = new THREE.Group();
                const geometry = new THREE.SphereGeometry(2, 64, 64);
                const textureLoader = new THREE.TextureLoader();
                const texture = textureLoader.load('https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/earthmap1k.jpg');
                const bumpMap = textureLoader.load('https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/earthbump1k.jpg');
                const specularMap = textureLoader.load('https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/earthspec1k.jpg');
                const material = new THREE.MeshPhongMaterial({
                    map: texture,
                    bumpMap: bumpMap,
                    bumpScale: 0.05,
                    specularMap: specularMap,
                    specular: new THREE.Color('grey')
                });
                const globe = new THREE.Mesh(geometry, material);
                globeGroup.add(globe);
                
                // Atmosphere
                const atmosphereGeometry = new THREE.SphereGeometry(2.1, 64, 64);
                const atmosphereMaterial = new THREE.ShaderMaterial({
                    vertexShader: `
                        varying vec3 vNormal;
                        void main() {
                            vNormal = normalize(normalMatrix * normal);
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vNormal;
                        void main() {
                            float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 4.0);
                            gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                        }
                    `,
                    blending: THREE.AdditiveBlending,
                    side: THREE.BackSide,
                    transparent: true
                });
                const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
                globeGroup.add(atmosphere);

                scene.add(globeGroup);

                // Helper function to create glowing markers
                const createGlowSprite = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128;
                    canvas.height = 128;
                    const context = canvas.getContext('2d');
                    const gradient = context.createRadialGradient(canvas.width / 2, canvas.height / 2, 0, canvas.width / 2, canvas.height / 2, canvas.width / 2);
                    gradient.addColorStop(0, 'rgba(255,0,0,1)');
                    gradient.addColorStop(0.2, 'rgba(255,100,100,1)');
                    gradient.addColorStop(0.4, 'rgba(255,0,0,0.2)');
                    gradient.addColorStop(1, 'rgba(255,0,0,0)');
                    context.fillStyle = gradient;
                    context.fillRect(0, 0, canvas.width, canvas.height);
                    const texture = new THREE.CanvasTexture(canvas);
                    const spriteMaterial = new THREE.SpriteMaterial({ map: texture, blending: THREE.AdditiveBlending, transparent: true });
                    const sprite = new THREE.Sprite(spriteMaterial);
                    sprite.scale.set(0.3, 0.3, 0.3);
                    return sprite;
                };

                // Add markers for each country
                const representedCountries = [...new Set(wines.map(w => w.country))];
                representedCountries.forEach(country => {
                    const coords = countryCoords[country];
                    if (coords) {
                        const latRad = coords.lat * (Math.PI / 180);
                        const lonRad = -coords.lon * (Math.PI / 180);
                        const radius = 2;
                        
                        const x = radius * Math.cos(latRad) * Math.cos(lonRad);
                        const y = radius * Math.sin(latRad);
                        const z = radius * Math.cos(latRad) * Math.sin(lonRad);

                        const glowSprite = createGlowSprite();
                        glowSprite.position.set(x, y, z);
                        globeGroup.add(glowSprite);
                    }
                });

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
                directionalLight.position.set(5, 3, 5);
                scene.add(directionalLight);

                camera.position.z = 4;

                // Mouse controls
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };
                
                const onMouseDown = (e) => { isDragging = true; };
                const onMouseMove = (e) => {
                    if (!isDragging) return;
                    const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
                    globeGroup.rotation.y += deltaMove.x * 0.005;
                    globeGroup.rotation.x += deltaMove.y * 0.005;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                };
                const onMouseUp = () => { isDragging = false; };
                
                mount.addEventListener('mousedown', onMouseDown);
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
                
                const animate = (time) => {
                    requestAnimationFrame(animate);
                    if (!isDragging) {
                        globeGroup.rotation.y += 0.0005;
                    }
                    // Pulsing effect for markers
                    globeGroup.children.forEach(child => {
                        if (child instanceof THREE.Sprite) {
                            const scale = 0.3 + Math.sin(time * 0.002) * 0.05;
                            child.scale.set(scale, scale, scale);
                        }
                    });
                    renderer.render(scene, camera);
                };
                animate();

                // Handle resize
                const handleResize = () => {
                    camera.aspect = mount.clientWidth / mount.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(mount.clientWidth, mount.clientHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    mount.removeEventListener('mousedown', onMouseDown);
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                    if (renderer.domElement) mount.removeChild(renderer.domElement);
                    scene.clear();
                };
            }, [wines]);

            return <div ref={mountRef} style={{ width: '100%', height: '300px', cursor: 'grab' }} />;
        };

                                    <span className="text-sm text-gray-400 sans-font">{count} wines</span>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="glass-card rounded-xl p-4 sm:p-6 animate-fade-in" style={{ animationDelay: '0.2s' }}>

                        <div className="space-y-2">
                            {sortedVintages.map(({ vintage, count }, index) => (
                                <div key={vintage} className="flex items-center justify-between p-3 rounded-lg bg-gray-800/50 backdrop-blur-sm hover:bg-gray-800/70 transition-colors">
                                    <div className="flex items-center gap-3">

                                    <span className="text-sm text-gray-400 sans-font">{count} wines</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

                                <a href="https://www.facebook.com/WineSpectator" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-red-400 transition-colors"><svg className="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg></a>
                                <a href="https://x.com/WineSpectator" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-red-400 transition-colors"><svg className="h-6 w-6" fill="currentColor" viewBox="0 0 16 16"><path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.602.75Zm-1.28,12.95h1.905L3.835 1.65H1.93L11.32,13.7Z"/></svg></a>
                                <a href="https://www.instagram.com/wine_spectator/" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-red-400 transition-colors"><svg className="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073z"/><path d="M12 5.838c-3.403 0-6.162 2.759-6.162 6.162 0 3.403 2.759 6.163 6.162 6.163 3.403 0 6.162-2.76 6.162-6.163 0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4z"/><circle cx="18.406" cy="5.594" r="1.44"/></svg></a>
                            </div>
                        </div>
                    </div>
                    <div className="border-t border-gray-800 mt-8 pt-8 text-center text-sm text-gray-400">
                        <p>&copy; 2025 Wine Spectator. All rights reserved. | <a href="#" className="hover:text-red-400 transition-colors">Privacy Policy</a> | <a href="#" className="hover:text-red-400 transition-colors">Terms of Service</a></p>
                    </div>
                </div>
            </footer>
        );

        // The main hero section at the top of the page.
        const Hero = () => {
            const videoRef = useRef(null);
            const [videoError, setVideoError] = useState(false);
            
            useEffect(() => {
                const video = videoRef.current;
                if (video) {
                    // Log video state for debugging
                    console.log('Video element found');
                    
                    video.addEventListener('loadstart', () => console.log('Video load started'));
                    video.addEventListener('loadeddata', () => console.log('Video data loaded'));
                    video.addEventListener('canplay', () => console.log('Video can play'));
                    video.addEventListener('playing', () => console.log('Video is playing'));
                    
                    video.addEventListener('error', (e) => {
                        console.error('Video error:', e);
                        console.error('Error code:', video.error?.code);
                        console.error('Error message:', video.error?.message);
                        setVideoError(true);
                    });
                    
                    // Try to play manually
                    video.play().catch(error => {
                        console.error('Autoplay failed:', error);
                        setVideoError(true);
                    });
                }
            }, []);
            
            return (
                <div className="hero-section">
                    <video 
                        ref={videoRef}
                        autoPlay 
                        loop 
                        muted 
                        playsInline
                        poster="https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?w=1920&q=80"
                        style={{ display: videoError ? 'none' : 'block' }}
                    >
                        <source src="https://raw.githubusercontent.com/mcapace/wine-top-100/main/hero.mp4" type="video/mp4" />
                        {/* Fallback video sources */}
                        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4" />
                        Your browser does not support the video tag.
                    </video>
                    
                    {/* Fallback image if video fails */}
                    {videoError && (
                        <div 
                            className="absolute inset-0 bg-cover bg-center"
                            style={{ 
                                backgroundImage: 'url(https://images.unsplash.com/photo-1506377247377-2a5b3b417ebb?w=1920&q=80)',
                                filter: 'brightness(0.7)'
                            }}
                        />
                    )}
                    
                    <div className="hero-overlay"></div>
                    <div className="hero-content">
                        <div className="text-center px-4 max-w-4xl">
                            <h1 className="text-3xl sm:text-5xl md:text-6xl font-bold text-white mb-3 animate-fade-in glow-text" style={{ animationDelay: '0.2s' }}>
                                Top 100 Wines
                            </h1>
                            <p className="text-lg sm:text-xl md:text-2xl text-gray-200 mb-4 animate-fade-in" style={{ animationDelay: '0.4s' }}>
                                2025 Edition
                            </p>
                            <p className="text-base sm:text-lg md:text-xl text-gray-300 max-w-3xl mx-auto mb-8 animate-fade-in" style={{ animationDelay: '0.6s' }}>
                                Our editors' selection of the year's most exciting wines from around the world
                            </p>
                            <a href="#wines" className="inline-block bg-gradient-to-r from-red-800 to-red-900 text-white px-6 sm:px-8 py-3 rounded-full font-semibold text-base sm:text-lg hover:from-red-900 hover:to-red-800 transition-all duration-300 animate-fade-in pulse-button" style={{ animationDelay: '0.8s' }}>
                                Explore the Collection
                            </a>
                        </div>
                    </div>
                    <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 animate-bounce">
                        <svg className="w-5 h-5 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                        </svg>
                    </div>
                </div>
            );
        };

        // The main navigation bar.
        const Navbar = ({ scrolled }) => {
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            return (
                <>
                    <nav className={`fixed top-0 left-0 right-0 z-30 transition-all duration-300 ${scrolled ? 'navbar-glass' : ''}`}>
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
                            <div className="flex justify-between items-center">
                                <img src="https://i.ibb.co/27L2JKhF/WSlogo-White.png" alt="Wine Spectator" className="h-8 sm:h-9" />
                                
                                <div className="hidden md:flex items-center gap-8">
                                    <a href="#wines" className="text-white hover:text-red-400 transition-colors">Wines</a>
                                    <a href="#about" className="text-white hover:text-red-400 transition-colors">About</a>
                                    <a href="#contact" className="text-white hover:text-red-400 transition-colors">Contact</a>
                                    <button className="bg-red-800 text-white px-4 py-2 rounded-full hover:bg-red-900 transition-colors">Subscribe</button>
                                </div>
                                
                                <button onClick={() => setMobileMenuOpen(true)} className="md:hidden text-white hover:text-red-400 transition-colors">
                                    <Menu className="h-6 w-6" />
                                </button>
                            </div>
                        </div>
                    </nav>
                    
                    <div className={`mobile-menu-overlay md:hidden ${mobileMenuOpen ? 'open' : ''}`} onClick={() => setMobileMenuOpen(false)}></div>
                    
                    <div className={`mobile-menu md:hidden ${mobileMenuOpen ? 'open' : ''}`}>
                        <button onClick={() => setMobileMenuOpen(false)} className="absolute top-4 right-4 text-white hover:text-red-400 transition-colors">
                            <X className="h-6 w-6" />
                        </button>
                        
                        <div className="pt-16">
                            <img src="https://i.ibb.co/27L2JKhF/WSlogo-White.png" alt="Wine Spectator" className="h-12 mb-8" />
                            
                            <nav className="space-y-4">
                                <a href="#wines" onClick={() => setMobileMenuOpen(false)} className="block text-white hover:text-red-400 transition-colors text-lg py-2">Wines</a>
                                <a href="#about" onClick={() => setMobileMenuOpen(false)} className="block text-white hover:text-red-400 transition-colors text-lg py-2">About</a>
                                <a href="#contact" onClick={() => setMobileMenuOpen(false)} className="block text-white hover:text-red-400 transition-colors text-lg py-2">Contact</a>
                                <button className="bg-red-800 text-white px-6 py-3 rounded-full hover:bg-red-900 transition-colors w-full mt-6">Subscribe</button>
                            </nav>
                        </div>
                    </div>
                </>
            );
        };

        // The main application component that orchestrates all other components.
        function HomePage() {
            const [filters, setFilters] = useState({ search: '', type: [], country: [], vintage: [] });
            const [sortBy, setSortBy] = useState('rank');
            const [selectedWine, setSelectedWine] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [tastingData, setTastingData] = useState(initializeTastingData());
            const [scrolled, setScrolled] = useState(false);
            const [isCondensedView, setIsCondensedView] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 100);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const filteredAndSortedWines = useMemo(() => {
                const filtered = wines.filter(wine => {
                    if (filters.search) {
                        const searchTerm = filters.search.toLowerCase();
                        if (!wine.name.toLowerCase().includes(searchTerm) &&
                            !wine.winery.toLowerCase().includes(searchTerm) &&
                            !wine.region.toLowerCase().includes(searchTerm) &&
                            !wine.country.toLowerCase().includes(searchTerm) &&
                            !wine.varietal.toLowerCase().includes(searchTerm)) {
                            return false;
                        }
                    }
                    if (filters.type.length > 0 && !filters.type.includes(wine.type)) return false;
                    if (filters.country.length > 0 && !filters.country.includes(wine.country)) return false;
                    if (filters.vintage.length > 0 && !filters.vintage.includes(wine.vintage.toString())) return false;
                    return true;
                });

                return [...filtered].sort((a, b) => {
                    switch (sortBy) {
                        case 'rank': return a.rank - b.rank;
                        case 'score-desc': return b.score - a.score;
                        case 'score-asc': return a.score - b.score;
                        case 'price-desc': return b.price - a.price;
                        case 'price-asc': return a.price - b.price;
                        case 'vintage-desc': return b.vintage - a.vintage;
                        case 'vintage-asc': return a.vintage - b.vintage;
                        case 'name': return a.name.localeCompare(b.name);
                        default: return a.rank - b.rank;
                    }
                });
            }, [filters, sortBy]);

            const handleTastingChange = (wineId, type, checked) => {
                const newTastingData = { ...tastingData };
                if (checked) {
                    if (!newTastingData[type].includes(wineId)) {
                        newTastingData[type] = [...newTastingData[type], wineId];
                    }
                } else {
                    newTastingData[type] = newTastingData[type].filter(id => id !== wineId);
                }
                setTastingData(newTastingData);
                localStorage.setItem('wineTastings', JSON.stringify(newTastingData));
            };

            return (
                <div className="min-h-screen">
                    <Navbar scrolled={scrolled} />
                    <Hero />
                    
                    <div id="about" className="parallax-section bg-gray-900 relative">
                        <div className="parallax-bg"></div>
                        <div className="relative z-10 max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-16 sm:py-20">
                            <div className="glass-card rounded-xl p-6 sm:p-8">
                                <div className="prose prose-lg max-w-none text-gray-300">
                                    <h2 className="text-2xl sm:text-3xl font-bold text-white mb-6">About the Top 100</h2>
                                    <p className="leading-relaxed mb-4">Wine Spectator's Top 100 is our editors' annual selection of the year's most exciting wines. These 100 bottles represent the pinnacle of quality, value, and availability - wines that don't just score high, but deliver exceptional drinking experiences and tell compelling stories.</p>
                                    <p className="leading-relaxed mb-4">Our expert panel tastes more than 15,000 wines blind each year. From this extensive evaluation, we select these 100 wines that exemplify excellence across all categories - from everyday values to once-in-a-lifetime splurges.</p>
                                    <p className="leading-relaxed">This year's list celebrates both tradition and innovation, featuring time-honored estates alongside exciting new discoveries. Each wine has earned its place through a combination of outstanding quality, fair pricing relative to its peers, and sufficient production to be found in the market.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <main id="wines" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-20 space-y-8 sm:space-y-12">
                        <TastingTracker tastingData={tastingData} />
                        <AnalyticsDashboard wines={filteredAndSortedWines} />
                        <WineFilters 
                            filters={filters} 
                            onFiltersChange={setFilters} 
                            sortBy={sortBy} 
                            onSortChange={setSortBy} 
                            totalWines={wines.length} 
                            filteredCount={filteredAndSortedWines.length} 
                            isCondensedView={isCondensedView} 
                            onViewToggle={setIsCondensedView} 
                        />
                        {filteredAndSortedWines.length > 0 ? (
                            <div className={isCondensedView ? "wine-grid-condensed" : "wine-grid"}>
                                {filteredAndSortedWines.map((wine, index) => (
                                    <div key={wine.id} style={{ animationDelay: `${index * 0.05}s` }}>
                                        {isCondensedView ? (
                                            <WineCardCondensed wine={wine} onViewDetails={(w) => { setSelectedWine(w); setIsModalOpen(true); }} tastingData={tastingData} onTastingChange={handleTastingChange} />
                                        ) : (
                                            <WineCard wine={wine} onViewDetails={(w) => { setSelectedWine(w); setIsModalOpen(true); }} tastingData={tastingData} onTastingChange={handleTastingChange} />
                                        )}
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20">
                                <h3 className="text-2xl font-semibold text-white mb-2">No wines found</h3>
                                <p className="text-gray-400 mb-6">Try adjusting your filters to discover more exceptional wines.</p>
                                <button onClick={() => setFilters({ search: '', type: [], country: [], vintage: [] })} className="bg-gradient-to-r from-red-800 to-red-900 text-white px-6 py-3 rounded-full hover:from-red-900 hover:to-red-800 transition-all duration-300">
                                    Reset All Filters
                                </button>
                            </div>
                        )}
                    </main>
                    <Footer />
                    <WineDetailModal 
                        wine={selectedWine} 
                        isOpen={isModalOpen} 
                        onClose={() => { setIsModalOpen(false); setSelectedWine(null); }} 
                        tastingData={tastingData} 
                        onTastingChange={handleTastingChange} 
                    />
                    <AIAssistant wines={wines} />
                </div>
            );
        }

        // Render the main React component to the DOM.
        ReactDOM.render(<HomePage />, document.getElementById('root'));
    </script>
</body>
</html>
